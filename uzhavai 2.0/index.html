        const baseLife = veg === 'spinach' ? 3 : veg === 'tomato' ? 7 : 30;

          remaining -= 1;

        if (veg === 'tomato' && sensors.zoneB.temp > 30) {
          remaining -= 2;
        }
        
        // Step 4: Zone C (Onion) Humidity > 60% -> Subtract 5 Days
        if (veg === 'onion' && sensors.zoneC.humidity > 60) {
          remaining -= 5;
        }
        
        // Step 5: Minimum Remaining Life = 0
        remaining = Math.max(0, remaining);
        
        return remaining;

                            {t('whatsAppPlaceholder')}
                          </div>
                        ) : (
                          notificationsList.filter(n => n.type === 'whatsapp').map((notif) => (
                            <div key={notif.id} class="bg-slate-900 border-l-4 border-green-500 p-3 rounded-r-xl shadow-md text-xs">
                              <div class="flex justify-between items-center text-green-500 font-bold mb-1">
                                <span>{lang === 'en' ? notif.titleEn : notif.titleTa}</span>
                                <span class="text-[9px] text-slate-500 font-semibold">{notif.time}</span>
                              </div>
                              <p class="text-slate-300 whitespace-pre-line leading-relaxed font-semibold">
                                {lang === 'en' ? notif.textEn : notif.textTa}
                              </p>
                            </div>
                          ))
                        )
                      )}

                      {notificationTab === 'sms' && (
                        notificationsList.filter(n => n.type === 'sms').length === 0 ? (
                          <div class="text-center text-slate-600 py-12 text-xs font-medium italic">
                            {t('smsPlaceholder')}
                          </div>
                        ) : (
                          notificationsList.filter(n => n.type === 'sms').map((notif) => (
                            <div key={notif.id} class="bg-slate-900 border-l-4 border-sky-500 p-3 rounded-r-xl shadow-md text-xs">
                              <div class="flex justify-between items-center text-sky-400 font-bold mb-1">
                                <span>SMS ALERT</span>
                                <span class="text-[9px] text-slate-500 font-semibold">{notif.time}</span>
                              </div>
                              <p class="text-slate-300 leading-relaxed font-semibold">
                                {lang === 'en' ? notif.textEn : notif.textTa}
                              </p>
                            </div>
                          ))
                        )
                      )}

                      {notificationTab === 'voice' && (
                        <div class="text-center py-6 px-2 space-y-4">
                          
                          {/* Tamil Voice Assistant Card */}
                          <div class="bg-slate-900/80 p-5 rounded-3xl border border-slate-800 shadow-lg space-y-4">
                            <h5 class="text-xs font-black text-amber-400 uppercase tracking-widest text-left">
                              {lang === 'en' ? 'Tamil Voice Assistant' : 'தமிழ் குரல் உதவியாளர்'}
                            </h5>
                            
                            <div class="flex items-center justify-between bg-slate-950 p-3 rounded-2xl border border-slate-800">
                              <div class="flex items-center gap-2.5">
                                <span class="text-lg">🎤</span>
                                <span class="text-xs font-bold text-slate-300">{lang === 'en' ? 'Voice Alert Ready' : 'குரல் எச்சரிக்கை தயார்'}</span>
                              </div>
                              
                              {/* Play Button */}
                              <button 
                                onClick={() => setIsVoicePlaying(!isVoicePlaying)}
                                class={`w-9 h-9 rounded-full flex items-center justify-center transition-all ${isVoicePlaying ? 'bg-amber-500 text-slate-950 shadow-md animate-pulse' : 'bg-slate-800 text-amber-400 hover:bg-slate-700'}`}
                              >
                                {isVoicePlaying ? (
                                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                    <rect x="6" y="4" width="4" height="16" />
                                    <rect x="14" y="4" width="4" height="16" />
                                  </svg>
                                ) : (
                                  <svg class="w-4 h-4 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                                    <polygon points="5 3 19 12 5 21" />
                                  </svg>
                                )}
                              </button>
                            </div>

                            {/* Voice Wave Animation */}
                            {isVoicePlaying ? (
                              <div class="flex items-end justify-center gap-1.5 h-12 py-2">
                                <div class="w-1 bg-amber-500 rounded-full h-8 animate-wave-bar" style={{ animationDelay: '0.1s' }}></div>
                                <div class="w-1 bg-amber-500 rounded-full h-5 animate-wave-bar" style={{ animationDelay: '0.3s' }}></div>
                                <div class="w-1 bg-amber-500 rounded-full h-10 animate-wave-bar" style={{ animationDelay: '0.0s' }}></div>
                                <div class="w-1 bg-amber-500 rounded-full h-4 animate-wave-bar" style={{ animationDelay: '0.4s' }}></div>
                                <div class="w-1 bg-amber-500 rounded-full h-7 animate-wave-bar" style={{ animationDelay: '0.2s' }}></div>
                              </div>
                            ) : (
                              <div class="flex items-end justify-center gap-1.5 h-12 py-2 opacity-30">
                                <div class="w-1 bg-slate-700 rounded-full h-2"></div>
                                <div class="w-1 bg-slate-700 rounded-full h-2"></div>
                                <div class="w-1 bg-slate-700 rounded-full h-2"></div>
                                <div class="w-1 bg-slate-700 rounded-full h-2"></div>
                                <div class="w-1 bg-slate-700 rounded-full h-2"></div>
                              </div>
                            )}

                            {/* Alert Text Display */}
                            {isVoicePlaying && (
                              <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 text-center space-y-2.5">
                                <p class="text-sm font-bold text-amber-300 tracking-wide">
                                  கீரையை இன்றே விற்கவும்
                                </p>
                                <div class="w-8 h-px bg-slate-850 mx-auto"></div>
                                <p class="text-[11px] font-semibold text-slate-400 italic">
                                  Sell Spinach Today
                                </p>
                              </div>
                            )}

                            <p class="text-[10px] text-slate-500 font-bold italic text-center leading-tight">
                              {lang === 'en' ? 'Demonstrating future offline Tamil voice assistant capability' : 'ஆஃப்லைன் தமிழ் குரல் உதவித் திறனை விளக்குகிறது'}
                            </p>
                          </div>

                        </div>
                      )}
                    </div>

                    {/* Smartphone Home Bar */}
                    <div class="py-2.5 flex justify-center items-center border-t border-slate-800 bg-slate-950 mt-auto">
                      <div class="bg-slate-700 h-1.5 w-24 rounded-full"></div>
                    </div>

                  </div>

                </div>

              </div>

            </div>
          </main>

        </div>
      );

      // Hero Card render helper
      function renderHeroCard() {
        const { status, remaining, progressColor } = mostUrgentVeg.state;
        const formattedTime = formatTimeRemaining(mostUrgentVegKey);
        
        let colorClass = 'from-green-500 to-green-600';
        let subBg = 'bg-green-700/30';
        let label = t('safe');
        let pulsingClass = '';

        if (status === 'Sell Today') {
          colorClass = 'from-red-600 to-red-700 animate-bg-pulse-soft';
          subBg = 'bg-red-800/30';
          label = t('sellToday');
          pulsingClass = 'animate-pulse-fast';
        } else if (status === 'Sell Soon') {
          colorClass = 'from-yellow-500 to-yellow-600';
          subBg = 'bg-yellow-700/30';
          label = t('sellSoon');
        }

        return (
          <div class={`bg-gradient-to-r ${colorClass} text-white rounded-3xl p-6 sm:p-8 shadow-md relative overflow-hidden flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border`}>
            
            {/* Background elements */}
            <div class="absolute -right-4 -bottom-6 text-[150px] opacity-10 font-bold select-none pointer-events-none">
              🌾
            </div>
            
            <div class="space-y-2 z-10">
              <span class={`text-xs font-black uppercase tracking-widest px-3 py-1 rounded-full ${subBg} border border-white/20 inline-flex items-center gap-1.5`}>
                <span class={`w-2 h-2 rounded-full bg-white ${pulsingClass}`}></span>
                {t('heroTitle')}
              </span>
              
              <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tight flex items-baseline gap-2">
                {label}
              </h2>
              
              <p class="text-lg sm:text-xl font-extrabold opacity-95">
                {mostUrgentVeg.name}
              </p>
            </div>

            <div class="z-10 bg-white/10 backdrop-blur-md rounded-2xl p-4 border border-white/10 w-full sm:w-auto text-center sm:text-right flex sm:flex-col justify-between sm:justify-center items-center sm:items-end gap-1">
              <span class="text-xs font-extrabold opacity-75 uppercase tracking-wider">{t('remaining')}:</span>
              <span class="text-xl sm:text-2xl font-black">{formattedTime}</span>
            </div>

          </div>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
